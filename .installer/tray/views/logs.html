<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- 🧾 Título de la ventana -->
  <title>MonitAgent — Logs</title>

  <!-- ⚡ Optimiza carga de fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <!-- 🔤 Fuentes: UI + logs -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* 🔄 Reset global */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* 🎨 Variables de tema */
      --bg:        #0a0810;
      --bg2:       #0f0d18;
      --bg3:       #131020;
      --border:    rgba(180,140,255,0.08);
      --border-hi: rgba(180,140,255,0.22);
      --accent:    #b48cff;
      --accent2:   #4ade80; /* 🟢 verde activo */
      --text:      #ede8f8;
      --muted:     #6a5a80;
      --danger:    #ff5f8d;
      --warn:      #e8a0ff;
      --success:   #a78bfa;
    }

    /* 🧱 Layout base */
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* 🌌 Fondo grid animado */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(180,140,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180,140,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      animation: drift 20s linear infinite;
      pointer-events: none;
    }

    /* 🎞 Animación del grid */
    @keyframes drift { to { background-position: 32px 32px; } }

    /* 💜 Glow superior */
    .bg-glow {
      position: fixed; z-index: 0; pointer-events: none;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(140,80,255,0.07) 0%, transparent 70%);
      top: -180px; left: -120px;
    }

    /* 💜 Glow inferior */
    .bg-glow2 {
      position: fixed; z-index: 0; pointer-events: none;
      width: 340px; height: 340px; border-radius: 50%;
      background: radial-gradient(circle, rgba(180,100,255,0.05) 0%, transparent 70%);
      bottom: -80px; right: -80px;
    }

    /* 📦 Contenedor principal */
    .shell {
      position: relative; z-index: 1;
      width: 100%; height: 100vh;
      display: flex; flex-direction: column;
    }

    /* 🔝 Barra superior */
    .topbar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      background: rgba(10,8,16,0.88);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    /* 🏷 Branding */
    .brand { display: flex; align-items: center; gap: 8px; margin-right: 4px; }

    .brand-icon {
      width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(180,140,255,0.2), rgba(140,80,255,0.12));
      border: 1px solid var(--border-hi);
      display: flex; align-items: center; justify-content: center;
    }

    .brand-icon svg { width: 14px; height: 14px; }

    .brand-name {
      font-size: 13px; font-weight: 700; color: var(--text);
      letter-spacing: -0.01em;
    }

    /* ➖ Separador */
    .sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }

    /* 🔘 Badge de estado */
    .status-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 500;
      padding: 3px 10px; border-radius: 20px;
      border: 1px solid; transition: all 0.2s ease;
      white-space: nowrap;
    }

    /* 🎯 Estados visuales */
    .status-badge.stopped  { color: var(--danger);  border-color: rgba(255,95,141,0.3);  background: rgba(255,95,141,0.07); }
    .status-badge.starting { color: var(--warn);    border-color: rgba(232,160,255,0.3); background: rgba(232,160,255,0.07); }
    .status-badge.running  { color: var(--accent2); border-color: rgba(212,170,255,0.3); background: rgba(212,170,255,0.07); }
    .status-badge.stopping { color: var(--warn);    border-color: rgba(232,160,255,0.3); background: rgba(232,160,255,0.07); }

    /* 🔁 Badge de reinicios automáticos */
    .restart-badge {
      display: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 500;
      padding: 3px 10px; border-radius: 20px;
      color: var(--warn);
      border: 1px solid rgba(232,160,255,0.25);
      background: rgba(232,160,255,0.06);
      white-space: nowrap;
    }

    /* ℹ Info de app */
    .info-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); white-space: nowrap; }

    .spacer { flex: 1; }

    /* 🎮 Grupo de botones */
    .ctrl-group { display: flex; align-items: center; gap: 6px; }

    /* 🔘 Botón base */
    .btn {
      font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 600;
      padding: 5px 14px; border-radius: 6px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--muted);
      cursor: pointer; outline: none;
      transition: all 0.15s ease;
      letter-spacing: 0.01em; white-space: nowrap;
    }

    /* 🖱 Hover botones */
    .btn:hover:not(:disabled) { background: rgba(180,140,255,0.08); color: var(--text); border-color: rgba(180,140,255,0.2); }

    /* 🚫 Botón deshabilitado */
    .btn:disabled { opacity: 0.28; cursor: not-allowed; }

    /* ▶ Botón iniciar */
    .btn-start   { border-color: rgba(212,170,255,0.25); color: var(--accent2); background: rgba(212,170,255,0.05); }

    /* ■ Botón detener */
    .btn-stop    { border-color: rgba(255,95,141,0.25);  color: var(--danger);  background: rgba(255,95,141,0.05); }

    /* ↺ Botón restart */
    .btn-restart { border-color: rgba(180,140,255,0.2);  color: var(--accent);  background: rgba(180,140,255,0.04); }

    /* 🧹 Limpiar logs */
    .btn-clear   { border-color: var(--border); color: var(--muted); }

    /* 📜 Contenedor logs */
    .log-wrap { flex: 1; overflow: hidden; position: relative; }

    .log-box {
      position: absolute; inset: 0;
      overflow-y: auto; padding: 14px 18px;
    }

    /* 🧾 Estilo logs */
    pre {
      margin: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; line-height: 1.7;
      white-space: pre-wrap; word-break: break-all;
      color: #8a7aa0;
    }

    /* 🎨 Colores por tipo de log */
    pre .err  { color: #ff6b9d; }
    pre .wrn  { color: #e8a0ff; }
    pre .inf  { color: var(--accent2); }
    pre .tray { color: var(--accent); }
    pre .ts   { color: #3a2d50; }

    /* 🔻 Footer */
    .footer {
      display: flex; align-items: center;
      padding: 6px 16px;
      border-top: 1px solid var(--border);
      background: rgba(10,8,16,0.7);
      flex-shrink: 0;
    }

    /* 🔽 Hint de scroll */
    .footer-hint { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }

    /* 🔵 Indicador auto-scroll */
    .scroll-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent2); margin-left: auto;
      opacity: 0; transition: opacity 0.3s;
    }

    /* ✨ Animación indicador */
    .scroll-dot.active { opacity: 1; animation: blink 1.2s ease-in-out infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* 🎬 Animación entrada */
    .topbar, .log-wrap, .footer { opacity: 0; animation: fadeUp 0.35s ease forwards; }

    @keyframes fadeUp {
      to   { opacity: 1; transform: translateY(0); }
      from { opacity: 0; transform: translateY(6px); }
    }
  </style>
</head>
<body>

  <!-- 🌌 Fondos -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <div class="shell">

    <!-- 🔝 HEADER -->
    <div class="topbar">
      <div class="brand">
        <div class="brand-icon">
          <!-- 📈 Icono SVG -->
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.6"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <span class="brand-name">MonitAgent</span>
      </div>

      <div class="sep"></div>

      <!-- 🔴🟢 Estado -->
      <span class="status-badge stopped" id="status">⬤ ...</span>

      <!-- 🔁 Auto-restart counter -->
      <span class="restart-badge" id="restart-badge"></span>

      <!-- ℹ Info app -->
      <span class="info-badge" id="info-badge">cargando...</span>

      <div class="spacer"></div>

      <!-- 🎮 Controles -->
      <div class="ctrl-group">
        <button class="btn btn-start"   id="btn-start"   onclick="doStart()">▶ Iniciar</button>
        <button class="btn btn-stop"    id="btn-stop"    onclick="doStop()">■ Detener</button>
        <button class="btn btn-restart" id="btn-restart" onclick="doRestart()">↺ Reiniciar</button>
        <div class="sep"></div>
        <button class="btn btn-clear" onclick="doClear()">Limpiar</button>
      </div>
    </div>

    <!-- 📜 LOGS -->
    <div class="log-wrap">
      <div class="log-box" id="box">
        <pre id="log">Esperando logs...</pre>
      </div>
    </div>

    <!-- 🔻 FOOTER -->
    <div class="footer">
      <span class="footer-hint" id="footer-hint">auto-scroll activo</span>
      <div class="scroll-dot active" id="scroll-dot"></div>
    </div>

  </div>

  <script>
    // 🔌 Comunicación con Electron (main process)
    const { ipcRenderer } = require('electron')

    // 📌 Referencias DOM
    const logEl        = document.getElementById('log')
    const box          = document.getElementById('box')
    const statusEl     = document.getElementById('status')
    const restartBadge = document.getElementById('restart-badge')
    const infoBadge    = document.getElementById('info-badge')
    const btnStart     = document.getElementById('btn-start')
    const btnStop      = document.getElementById('btn-stop')
    const btnRestart   = document.getElementById('btn-restart')
    const footerHint   = document.getElementById('footer-hint')
    const scrollDot    = document.getElementById('scroll-dot')

    // 🧠 Estado interno
    let autoScroll  = true
    let serverState = 'starting'

    // 📜 Detecta si el usuario hizo scroll manual
    box.addEventListener('scroll', () => {
      autoScroll = (box.scrollHeight - box.scrollTop - box.clientHeight) < 40
      footerHint.textContent = autoScroll ? 'auto-scroll activo' : 'scroll manual — haz scroll al fondo para reanudar'
      scrollDot.classList.toggle('active', autoScroll)
    })

    // 🎮 Habilita/deshabilita botones según estado
    function applyButtonState(state) {
      const map = {
        stopped:  { start: false, stop: true,  restart: true  },
        starting: { start: true,  stop: true,  restart: true  },
        running:  { start: true,  stop: false, restart: false },
        stopping: { start: true,  stop: true,  restart: true  }
      }
      const s = map[state] || map.stopped
      btnStart.disabled   = s.start
      btnStop.disabled    = s.stop
      btnRestart.disabled = s.restart
    }

    // 🔄 Cambia texto y clase del estado
    function setStatus(state) {
      const labels = {
        stopped:  '⬤ Detenido',
        starting: '⬤ Iniciando...',
        running:  '⬤ Activo',
        stopping: '⬤ Deteniendo...'
      }
      statusEl.textContent = labels[state] || labels.stopped
      statusEl.className   = 'status-badge ' + (state || 'stopped')
    }

    // 📡 Estado desde backend
    ipcRenderer.on('button-state', (_, state) => {
      serverState = state
      setStatus(state)
      applyButtonState(state)
    })

    // ❤️ Ping de servidor vivo
    ipcRenderer.on('server-status', (_, alive) => {
      if (serverState === 'starting' || serverState === 'stopping') return
      setStatus(alive ? 'running' : 'stopped')
    })

    // ℹ Info app (versión + tiempo)
    ipcRenderer.on('app-info', (_, { version, started }) => {
      infoBadge.textContent = version + ' · ' + started
    })

    // 🔁 Contador auto-restart
    ipcRenderer.on('auto-restart-count', (_, count) => {
      restartBadge.style.display = count > 0 ? 'inline' : 'none'
      restartBadge.textContent   = '↺ ' + count + ' auto-restart' + (count > 1 ? 's' : '')
    })

    // 🧹 Limpia colores ANSI de consola
    function stripAnsi(str) {
      return str.replace(/\x1b\[[0-9;]*m/g, '').replace(/\[\d+m/g, '')
    }

    // 🎨 Colorea logs
    function colorize(text) {
      return stripAnsi(text).split('\n').map(line => {
        const s = line.replace(/&/g, '&amp;').replace(/</g, '&lt;')
        if (!s.trim()) return ''
        const withTs = s.replace(/^(\[\d{2}:\d{2}:\d{2}\])/, '<span class="ts">$1</span>')
        if (/error|ERR/i.test(s))  return '<span class="err">'  + withTs + '</span>'
        if (/warn|WARN/i.test(s))  return '<span class="wrn">'  + withTs + '</span>'
        if (/\[Tray\]/i.test(s))   return '<span class="tray">' + withTs + '</span>'
        if (/info|INFO/i.test(s))  return '<span class="inf">'  + withTs + '</span>'
        return withTs
      }).join('\n')
    }

    // 📡 Recibe logs en tiempo real
    ipcRenderer.on('log-update', (_, data) => {
      logEl.innerHTML = colorize(data)
      if (autoScroll) box.scrollTop = box.scrollHeight
    })

    // 🎮 Acciones hacia backend
    function doStart()   { ipcRenderer.send('server-start') }
    function doStop()    { ipcRenderer.send('server-stop') }
    function doRestart() { ipcRenderer.send('server-restart') }
    function doClear()   { ipcRenderer.send('clear-log-buffer') }
  </script>

</body>
</html>
