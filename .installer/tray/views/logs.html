<!DOCTYPE html>
<html>
    <head>
    <meta charset="UTF-8">
        <style>
            html, body {
                margin: 0; padding: 0;
                background: #000000; color: #ffffff;
                font-family: Consolas, monospace; font-size: 13px;
                height: 100%; overflow: hidden;
            }
            #bar {
                background: #111111; border-bottom: 1px solid #333;
                padding: 6px 12px; display: flex; align-items: center; gap: 6px;
            }
            #bar span { color: #888; font-size: 11px; margin-right: 8px; }
            #status {
                font-size: 11px; padding: 2px 8px; border-radius: 10px;
                background: #1a1a1a; border: 1px solid #333;
            }
            #info-badge {
                font-size: 10px; padding: 2px 8px; border-radius: 10px;
                background: #1a1a1a; border: 1px solid #333;
                color: #666; white-space: nowrap;
            }
            .btn {
                background: #222; color: #ccc; border: 1px solid #444;
                padding: 4px 12px; cursor: pointer;
                font-family: Consolas, monospace; font-size: 11px;
                border-radius: 3px; transition: background 0.15s, opacity 0.15s;
            }
            .btn:hover:not(:disabled) { background: #333; color: #fff; }
            .btn-start   { border-color: #2a5; color: #4d4; }
            .btn-start:hover:not(:disabled) { background: #1a3a1a; color: #6f6; }
            .btn-stop    { border-color: #a22; color: #d44; }
            .btn-stop:hover:not(:disabled)  { background: #3a1a1a; color: #f66; }
            .btn-restart { border-color: #555; }
            .btn-clear   { margin-left: auto; }
            .btn:disabled {
                opacity: 0.3;
                cursor: not-allowed;
                pointer-events: none;
            }
            #restart-badge {
                font-size: 10px; padding: 2px 7px; border-radius: 10px;
                background: #2a1a00; border: 1px solid #a63;
                color: #fa0; display: none;
            }
            #box {
                position: absolute; top: 37px; bottom: 0; left: 0; right: 0;
                overflow-y: auto; padding: 10px 14px;
            }
            #box::-webkit-scrollbar { width: 5px; }
            #box::-webkit-scrollbar-track { background: #000; }
            #box::-webkit-scrollbar-thumb { background: #333; }
            pre {
                margin: 0; white-space: pre-wrap; word-break: break-all;
                line-height: 1.6; color: #ffffff;
            }
            .err  { color: #ff6b6b; }
            .wrn  { color: #ffd93d; }
            .inf  { color: #6bcb77; }
            .tray { color: #4d96ff; }
            .ts   { color: #555; }
        </style>
    </head>
    <body>
        <div id="bar">
        <span>MonitAgent</span>
        <span id="status">⬤ ...</span>
        <span id="restart-badge"></span>
        <span id="info-badge">cargando...</span>
        <button id="btn-start"   class="btn btn-start"   onclick="doStart()">▶ Iniciar</button>
        <button id="btn-stop"    class="btn btn-stop"    onclick="doStop()">■ Detener</button>
        <button id="btn-restart" class="btn btn-restart" onclick="doRestart()">↺ Reiniciar</button>
        <button class="btn btn-clear" onclick="doClear()">Limpiar</button>
        </div>
        <div id="box"><pre id="log">Esperando logs...</pre></div>
        <script>
        const { ipcRenderer } = require('electron')
        const log          = document.getElementById('log')
        const box          = document.getElementById('box')
        const statusEl     = document.getElementById('status')
        const restartBadge = document.getElementById('restart-badge')
        const infoBadge    = document.getElementById('info-badge')
        const btnStart     = document.getElementById('btn-start')
        const btnStop      = document.getElementById('btn-stop')
        const btnRestart   = document.getElementById('btn-restart')

        let autoScroll  = true
        let serverState = 'starting' // copia local — fuente de verdad para el renderer

        box.addEventListener('scroll', () => {
        autoScroll = (box.scrollHeight - box.scrollTop - box.clientHeight) < 40
        })

        // ── Lógica de estados de botones ─────────────────────────────
        // stopped  → ▶ ON  | ■ OFF | ↺ OFF
        // starting → todos OFF (transición)
        // running  → ▶ OFF | ■ ON  | ↺ ON
        // stopping → todos OFF (transición)
        function applyButtonState(state) {
        const map = {
            stopped:  { start: false, stop: true,  restart: true  },
            starting: { start: true,  stop: true,  restart: true  },
            running:  { start: true,  stop: false, restart: false },
            stopping: { start: true,  stop: true,  restart: true  }
        }
        const s = map[state] || map.stopped
        btnStart.disabled   = s.start
        btnStop.disabled    = s.stop
        btnRestart.disabled = s.restart
        }

        function setStatus(state) {
        const labels = {
            stopped:  { text: '⬤ Detenido',      color: '#d44' },
            starting: { text: '⬤ Iniciando...',  color: '#fa0' },
            running:  { text: '⬤ Activo',        color: '#4d4' },
            stopping: { text: '⬤ Deteniendo...', color: '#fa0' }
        }
        const s = labels[state] || labels.stopped
        statusEl.textContent = s.text
        statusEl.style.color = s.color
        }

        // button-state es la fuente de verdad — siempre actualiza todo
        ipcRenderer.on('button-state', (_, state) => {
        serverState = state
        setStatus(state)
        applyButtonState(state)
        })

        // server-status viene del health check del tray —
        // SOLO actualiza el ícono visual si estamos en estado estable
        // NUNCA toca botones ni interfiere con transiciones
        ipcRenderer.on('server-status', (_, alive) => {
        if (serverState === 'starting' || serverState === 'stopping') return
        setStatus(alive ? 'running' : 'stopped')
        })

        ipcRenderer.on('app-info', (_, { version, started }) => {
        infoBadge.textContent = version + ' · ' + started
        })
        
        function stripAnsi(str) {
        return str.replace(/\x1b\[[0-9;]*m/g, '').replace(/\[\d+m/g, '')
        }

        function colorize(text) {
            return stripAnsi(text).split('\n').map(line => {
                const s = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').trim()
                if (!s) return ''
                const withTs = s.replace(/^(\[\d{2}:\d{2}:\d{2}\])/, '<span class="ts">$1</span>')
                if (/error|ERR/i.test(s))  return '<span class="err">'  + withTs + '</span>'
                if (/warn|WARN/i.test(s))  return '<span class="wrn">'  + withTs + '</span>'
                if (/\[Tray\]/i.test(s))   return '<span class="tray">' + withTs + '</span>'
                if (/info|INFO/i.test(s))  return '<span class="inf">'  + withTs + '</span>'
                return withTs
            }).join('\n')
        }

        ipcRenderer.on('log-update', (_, data) => {
        log.innerHTML = colorize(data)
        if (autoScroll) box.scrollTop = box.scrollHeight
        })

        ipcRenderer.on('auto-restart-count', (_, count) => {
        restartBadge.style.display = count > 0 ? 'inline' : 'none'
        restartBadge.textContent   = '↺ Auto-restart: ' + count
        })

        function doStart()   { ipcRenderer.send('server-start') }
        function doStop()    { ipcRenderer.send('server-stop') }
        function doRestart() { ipcRenderer.send('server-restart') }
        function doClear()   { ipcRenderer.send('clear-log-buffer') }
        </script>
    </body>
</html>
