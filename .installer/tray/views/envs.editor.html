<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MonitAgent — .env</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0a0810;
      --bg2:       #0f0d18;
      --bg3:       #131020;
      --border:    rgba(180,140,255,0.08);
      --border-hi: rgba(180,140,255,0.22);
      --accent:    #b48cff;
      --accent2:   #d4aaff;
      --text:      #ede8f8;
      --muted:     #6a5a80;
      --danger:    #ff5f8d;
      --warn:      #e8a0ff;
      --success:   #a78bfa;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(180,140,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180,140,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      animation: drift 20s linear infinite;
      pointer-events: none;
    }
    @keyframes drift { to { background-position: 32px 32px; } }

    .bg-glow {
      position: fixed; z-index: 0; pointer-events: none;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(140,80,255,0.07) 0%, transparent 70%);
      top: -180px; left: -120px;
    }
    .bg-glow2 {
      position: fixed; z-index: 0; pointer-events: none;
      width: 340px; height: 340px; border-radius: 50%;
      background: radial-gradient(circle, rgba(180,100,255,0.05) 0%, transparent 70%);
      bottom: -80px; right: -80px;
    }

    .shell {
      position: relative; z-index: 1;
      width: 100%; height: 100vh;
      display: flex; flex-direction: column;
    }

    .topbar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      background: rgba(10,8,16,0.88);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    .brand { display: flex; align-items: center; gap: 8px; margin-right: 4px; }
    .brand-icon {
      width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(180,140,255,0.2), rgba(140,80,255,0.12));
      border: 1px solid var(--border-hi);
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 14px; height: 14px; }
    .brand-name { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }

    .sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }

    .path-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--accent);
      background: rgba(180,140,255,0.07);
      border: 1px solid rgba(180,140,255,0.18);
      border-radius: 20px; padding: 3px 10px;
      max-width: 380px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .warn-badge {
      display: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 500;
      padding: 3px 10px; border-radius: 20px;
      color: var(--warn);
      border: 1px solid rgba(232,160,255,0.25);
      background: rgba(232,160,255,0.06);
      white-space: nowrap;
    }

    .spacer { flex: 1; }
    .ctrl-group { display: flex; align-items: center; gap: 6px; }

    .btn {
      font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 600;
      padding: 5px 14px; border-radius: 6px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--muted);
      cursor: pointer; outline: none;
      transition: all 0.15s ease;
      letter-spacing: 0.01em; white-space: nowrap;
    }
    .btn:hover:not(:disabled) { background: rgba(180,140,255,0.08); color: var(--text); border-color: rgba(180,140,255,0.2); }
    .btn:disabled { opacity: 0.28; cursor: not-allowed; }

    .btn-save   { border-color: rgba(212,170,255,0.25); color: var(--accent2); background: rgba(212,170,255,0.05); }
    .btn-save:hover:not(:disabled)   { background: rgba(212,170,255,0.1); border-color: rgba(212,170,255,0.4); }

    .btn-reload { border-color: rgba(180,140,255,0.2); color: var(--accent); background: rgba(180,140,255,0.04); }
    .btn-reload:hover:not(:disabled) { background: rgba(180,140,255,0.09); border-color: rgba(180,140,255,0.35); }

    .editor-wrap { flex: 1; overflow: hidden; display: flex; position: relative; }

    .line-numbers {
      background: rgba(15,13,24,0.6);
      border-right: 1px solid var(--border);
      padding: 14px 10px 14px 14px;
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; line-height: 1.7;
      color: var(--muted);
      user-select: none; overflow: hidden;
      min-width: 48px; white-space: pre; flex-shrink: 0;
    }

    #env-textarea {
      flex: 1; background: transparent;
      color: var(--accent2);
      border: none; outline: none;
      padding: 14px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; line-height: 1.7;
      resize: none; overflow-y: auto;
      white-space: pre; tab-size: 2;
      caret-color: var(--accent);
      user-select: text;
    }
    #env-textarea::selection { background: rgba(180,140,255,0.18); }
    #env-textarea::-webkit-scrollbar { width: 4px; }
    #env-textarea::-webkit-scrollbar-track { background: transparent; }
    #env-textarea::-webkit-scrollbar-thumb { background: rgba(180,140,255,0.12); border-radius: 4px; }
    #env-textarea::-webkit-scrollbar-thumb:hover { background: rgba(180,140,255,0.22); }

    .footer {
      display: flex; align-items: center; gap: 16px;
      padding: 6px 16px;
      border-top: 1px solid var(--border);
      background: rgba(10,8,16,0.7);
      flex-shrink: 0;
    }
    .footer-stat { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); white-space: nowrap; }
    .footer-msg  { font-family: 'JetBrains Mono', monospace; font-size: 10px; margin-left: auto; transition: all 0.2s ease; }
    .footer-msg.ok  { color: var(--success); }
    .footer-msg.err { color: var(--danger); }

    .topbar, .editor-wrap, .footer { opacity: 0; animation: fadeUp 0.35s ease forwards; }
    .topbar      { animation-delay: 0.04s; }
    .editor-wrap { animation-delay: 0.10s; }
    .footer      { animation-delay: 0.16s; }
    @keyframes fadeUp {
      to   { opacity: 1; transform: translateY(0); }
      from { opacity: 0; transform: translateY(6px); }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <div class="shell">

    <div class="topbar">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.6"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <span class="brand-name">MonitAgent</span>
      </div>

      <div class="sep"></div>

      <span class="path-badge" id="path-badge" title="">cargando...</span>
      <span class="warn-badge" id="warn-badge">⚠ archivo no encontrado — se creará al guardar</span>

      <div class="spacer"></div>

      <div class="ctrl-group">
        <button class="btn btn-reload" onclick="reloadFile()">↺ Recargar</button>
        <button class="btn btn-save"   onclick="saveFile()">▼ Guardar</button>
      </div>
    </div>

    <div class="editor-wrap">
      <div class="line-numbers" id="line-numbers">1</div>
      <textarea id="env-textarea" spellcheck="false"></textarea>
    </div>

    <div class="footer">
      <span class="footer-stat" id="stat-lines">Líneas: 1</span>
      <span class="footer-stat" id="stat-col">Col: 1</span>
      <span class="footer-msg"  id="footer-msg"></span>
    </div>

  </div>

  <script>
    const { ipcRenderer } = require('electron')

    const textarea  = document.getElementById('env-textarea')
    const lineNums  = document.getElementById('line-numbers')
    const statLines = document.getElementById('stat-lines')
    const statCol   = document.getElementById('stat-col')
    const footerMsg = document.getElementById('footer-msg')
    const pathBadge = document.getElementById('path-badge')
    const warnBadge = document.getElementById('warn-badge')

    ipcRenderer.on('env-init', (_, { path, content, hasError }) => {
      pathBadge.textContent   = path
      pathBadge.title         = path
      warnBadge.style.display = hasError ? 'inline' : 'none'
      textarea.value          = content
      updateLineNumbers()
    })

    textarea.addEventListener('scroll', () => { lineNums.scrollTop = textarea.scrollTop })

    function updateLineNumbers() {
      const lines = textarea.value.split('\n')
      statLines.textContent = 'Líneas: ' + lines.length
      lineNums.textContent  = lines.map((_, i) => i + 1).join('\n')
    }

    function updateCursor() {
      const pos    = textarea.selectionStart
      const before = textarea.value.substring(0, pos)
      const col    = before.length - before.lastIndexOf('\n')
      statCol.textContent = 'Col: ' + col
    }

    textarea.addEventListener('keyup',  updateCursor)
    textarea.addEventListener('click',  updateCursor)
    textarea.addEventListener('input',  updateLineNumbers)

    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault()
        const s = textarea.selectionStart
        const f = textarea.selectionEnd
        textarea.value = textarea.value.substring(0, s) + '  ' + textarea.value.substring(f)
        textarea.selectionStart = textarea.selectionEnd = s + 2
        updateLineNumbers()
      }
      if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveFile() }
    })

    let msgTimer = null
    function showMsg(text, type, ms = 3000) {
      footerMsg.textContent = text
      footerMsg.className   = 'footer-msg ' + type
      clearTimeout(msgTimer)
      msgTimer = setTimeout(() => { footerMsg.textContent = ''; footerMsg.className = 'footer-msg' }, ms)
    }

    function saveFile()   { ipcRenderer.send('save-env', textarea.value) }
    function reloadFile() { ipcRenderer.send('reload-env') }

    ipcRenderer.on('env-saved',   (_, ok)      => { showMsg(ok ? '✓ guardado correctamente' : '✗ error al guardar', ok ? 'ok' : 'err') })
    ipcRenderer.on('env-content', (_, content) => { textarea.value = content; updateLineNumbers(); showMsg('↺ recargado', 'ok', 2000) })

    updateLineNumbers()
  </script>

</body>
</html>
